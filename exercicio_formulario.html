<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <form action="#" method="post" id="form" name="form">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite se nome completo" required>
        <br><br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
        <br><br>
        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" placeholder="Digite sua idade" required>
        <br><br>
        <label for="materia">Para qual matéria você está se candidatando para lecionar?</label>
        <br>
        <select id="materia" name="materia" required>
            <option value="">Selecione a matéria</option>
            <option value="matematica">Matemática</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option>
            <option value="ciencias">Ciências</option>
            <option value="historia">História</option>
            <option value="geografia">Geografia</option>
            <option value="artes">Artes</option>
        </select>
        <br><br>
        <label for="escolaridade">Nível de escolaridade</label>
        <br>
        <select id="escolaridade" name="escolaridade" required>
            <option value="">Selecione seu nível de escolaridade</option>
            <option value="superior-completo">Ensino Superior Completo</option>
            <option value="mestrado">Cursando mestrado</option>
            <option value="mestrado-completo">Mestrado Completo</option>
            <option value="doutorado">Cursando doutorado</option>
            <option value="doutorado-completo">Doutorado Completo</option>
        </select>
        <br><br>
        <label for="experiencia">Turnos que deseja atuar:</label>
        <br>
        <input type="checkbox" id="turno-matutino" name="turno" value="matutino">
        <label for="turno-matutino">Matutino</label>
        <input type="checkbox" id="turno-vespertino" name="turno" value="vespertino">
        <label for="turno-vespertino">Vespertino</label>
        <input type="checkbox" id="turno-noturno" name="turno" value="noturno">
        <label for="turno-noturno">Noturno</label>
        <br><br>
        <label for="descricao">Descrição sobre si.</label>
        <br>
        <textarea id="descricao" name="descricao" placeholder="Descreva-se brevemente" maxlength="200"></textarea>
        <br><br>
        <input type="submit" value="Enviar">
    </form>
</body>

</html>
